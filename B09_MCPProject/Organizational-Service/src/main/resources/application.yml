server:
  port: 8083 # 组织服务端口（与网关、User、Mentoring区分开）

spring:
  application:
    name: organizational-service # 注册到 Nacos 的微服务名称
  profiles:
    active: dev

  # Nacos 注册中心与配置中心
  cloud:
    nacos:
      discovery:
        server-addr: 8.134.126.87:8848 # Nacos 地址
        namespace: public # 根据实际情况修改
      config:
        server-addr: 8.134.126.87:8848
        file-extension: yaml

  # 【关键】Spring Boot 3.x 在 application.yml 中引入 Nacos 配置的强制写法
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}

  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 替换成你实际的数据库名（例如 organization_db）、账号和密码
    url: jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/organization-service-database?serverTimezone=UTC
    username: root
    password: 1603845288aA
  data:
    redis:
      host: localhost
      port: 6379
      password: 13377671259
      timeout: 5000

mybatis-plus:
  # Mapper XML 文件所在的路径
  mapper-locations: classpath*:/mapper/**/*.xml
  # 实体类所在的包名（结合你的 groupId，做相应调整）
  type-aliases-package: com.bnbu.org.entity
  configuration:
    # 开启数据库下划线字段到实体类驼峰属性的自动映射（如 org_unit_id -> orgUnitId）
    map-underscore-to-camel-case: true
    # 开发阶段开启 SQL 打印，方便快速排查“搜索”和“编辑”功能的数据落地情况
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 【关键】你的 DDL 中主键是 varchar(32)，这里配置默认使用 UUID 策略生成字符串主键
      id-type: assign_uuid

# OpenFeign 超时配置（用于后续跨服务调用，如获取 User 的详情）
feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000