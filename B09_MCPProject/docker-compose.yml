services:
  # ==================== 用户服务 ====================
  user-service:
    build:
      context: .
      dockerfile: User-Service/Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8081
      - spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.datasource.url=${USER_DB_URL:-jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/common-user?serverTimezone=UTC}
      - spring.datasource.username=${DB_USERNAME:-root}
      - spring.datasource.password=${DB_PASSWORD:-1603845288aA}
      - spring.application.name=user-service
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - spring.data.redis.host=${REDIS_HOST:-8.134.126.87}
      - spring.data.redis.port=${REDIS_PORT:-6379}
      - spring.data.redis.password=${REDIS_PASSWORD:-13377671259}
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== 网关 ====================
  gateway:
    build:
      context: .
      dockerfile: Gateway-module/Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8080
      - spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.application.name=gateway-module
      - GATEWAY_USER_SERVICE_URI=${GATEWAY_USER_SERVICE_URI:-http://user-service:8081}
      - NACOS_CONSOLE_PORT=8848
      - NACOS_CONSOLE_CONTEXT_PATH=/nacos
      - spring.data.redis.host=${REDIS_HOST:-8.134.126.87}
      - spring.data.redis.port=${REDIS_PORT:-6379}
      - spring.data.redis.password=${REDIS_PASSWORD:-13377671259}
    depends_on:
      user-service:
        condition: service_started
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== 组织服务 ====================
  organizational-service:
    build:
      context: .
      dockerfile: Organizational-Service/Dockerfile
    container_name: organizational-service
    ports:
      - "8083:8083"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8083
      - spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.application.name=organizational-service
      - spring.datasource.url=${ORG_DB_URL:-jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/organization-service-database?serverTimezone=UTC}
      - spring.datasource.username=${DB_USERNAME:-root}
      - spring.datasource.password=${DB_PASSWORD:-1603845288aA}
      - spring.data.redis.host=${REDIS_HOST:-8.134.126.87}
      - spring.data.redis.port=${REDIS_PORT:-6379}
      - spring.data.redis.password=${REDIS_PASSWORD:-13377671259}
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== Mentoring 服务 ====================
  mentoring-service:
    build:
      context: .
      dockerfile: Mentoring-Service/Dockerfile
    container_name: mentoring-service
    ports:
      - "8084:8084"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8084
      - spring.cloud.nacos.discovery.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.cloud.nacos.config.server-addr=${NACOS_SERVER_ADDR:-8.134.126.87:8848}
      - spring.application.name=mentoring-service
      - spring.datasource.url=${MENTORING_DB_URL:-jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/mentoring-service?serverTimezone=UTC&characterEncoding=utf8}
      - spring.datasource.username=${DB_USERNAME:-root}
      - spring.datasource.password=${DB_PASSWORD:-1603845288aA}
      - spring.data.redis.host=${REDIS_HOST:-8.134.126.87}
      - spring.data.redis.port=${REDIS_PORT:-6379}
      - spring.data.redis.password=${REDIS_PASSWORD:-13377671259}
    networks:
      - b09-net
    restart: unless-stopped

networks:
  b09-net:
    driver: bridge