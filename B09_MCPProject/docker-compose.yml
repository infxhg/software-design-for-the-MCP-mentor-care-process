services:
  # ==================== Nacos ====================
  nacos:
    image: nacos/nacos-server:v2.3.2-slim
    container_name: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - NACOS_AUTH_TOKEN=VGhpc0lzQU1vY2tTZWNyZXRLZXlUaGF0SXNWZXJ5TG9uZ0FuZFNlY3VyZQ==
      - NACOS_AUTH_IDENTITY_KEY=nacos
      - NACOS_AUTH_IDENTITY_VALUE=nacos
      - JVM_XMS=512m
      - JVM_XMX=512m
      - JVM_XMN=256m
    volumes:
      - nacos_data:/home/nacos/data
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== Redis ====================
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass 13377671259
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== 用户服务 ====================
  user-service:
    build:
      context: ./User-Service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8081:8081"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8081
      - spring.cloud.nacos.discovery.server-addr=nacos:8848
      - spring.application.name=user-service
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - spring.data.redis.host=redis
      - spring.data.redis.port=6379
      - spring.data.redis.password=13377671259
    depends_on:
      nacos:
        condition: service_started
      redis:
        condition: service_started
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== 网关 ====================
  gateway:
    build:
      context: ./Gateway-module
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8080:8080"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8080
      - spring.cloud.nacos.discovery.server-addr=nacos:8848
      - spring.application.name=gateway
      - GATEWAY_USER_SERVICE_URI=${GATEWAY_USER_SERVICE_URI:-http://localhost:8081}
      - NACOS_CONSOLE_PORT=8848
      - NACOS_CONSOLE_CONTEXT_PATH=/nacos
      - spring.data.redis.host=redis
      - spring.data.redis.port=6379
      - spring.data.redis.password=13377671259
    depends_on:
      nacos:
        condition: service_started
      user-service:
        condition: service_started
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== 组织服务 ====================
  organizational-service:
    build:
      context: ./Organizational-Service
      dockerfile: Dockerfile
    container_name: organizational-service
    ports:
      - "8083:8083"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8083
      - spring.cloud.nacos.discovery.server-addr=nacos:8848
      - spring.application.name=organizational-service
      - spring.datasource.url=jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/organization-service-database?serverTimezone=UTC
    depends_on:
      nacos:
        condition: service_started
    networks:
      - b09-net
    restart: unless-stopped

  # ==================== Mentoring 服务 ====================
  mentoring-service:
    build:
      context: ./Mentoring-Service
      dockerfile: Dockerfile
    container_name: mentoring-service
    ports:
      - "8084:8084"
    environment:
      - TZ=Asia/Shanghai
      - spring.profiles.active=prod
      - server.port=8084
      - spring.cloud.nacos.discovery.server-addr=nacos:8848
      - spring.application.name=mentoring-service
      - spring.datasource.url=jdbc:mysql://rm-7xvkq7eswp47232at3o.mysql.rds.aliyuncs.com:3306/mentoring-service?serverTimezone=UTC&characterEncoding=utf8
    depends_on:
      nacos:
        condition: service_started
    networks:
      - b09-net
    restart: unless-stopped

volumes:
  nacos_data:
  redis_data:

networks:
  b09-net:
    driver: bridge